---
# Prometheus Configuration — multi-cloud-infra-baseline
#
# Local development config. In production this is managed by the
# kube-prometheus-stack Helm chart with ServiceMonitor/PodMonitor CRDs.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    project: multi-cloud-infra-baseline

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Host metrics (Node Exporter)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+):.*"
        replacement: "$1"

  # Alertmanager
  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # ── Cloud-specific scrapers (enabled when credentials available) ───────────
  # AWS CloudWatch metrics via cloudwatch_exporter (optional)
  # - job_name: cloudwatch
  #   static_configs:
  #     - targets: ["cloudwatch-exporter:9106"]

  # GCP Cloud Monitoring via stackdriver_exporter (optional)
  # - job_name: stackdriver
  #   static_configs:
  #     - targets: ["stackdriver-exporter:9255"]
